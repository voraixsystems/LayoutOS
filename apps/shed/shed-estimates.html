<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LayoutOS — Saved Estimates</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #f4f5f7;
  --surface: #ffffff;
  --border:  #d1d5db;
  --blue:    #1d4ed8;
  --blue-lt: #eff6ff;
  --blue-dk: #1e3a8a;
  --green:   #15803d;
  --red:     #dc2626;
  --red-lt:  #fef2f2;
  --amber:   #b45309;
  --text:    #111827;
  --muted:   #6b7280;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

#app-header {
  background: var(--blue-dk);
  color: #fff;
  padding: 10px 20px;
  display: flex;
  align-items: baseline;
  gap: 14px;
  border-bottom: 3px solid var(--blue);
}
#app-header .brand-sub  { font-size: 11px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; }
#app-header .brand-main { font-size: 18px; font-weight: 700; }
#app-header .brand-tag  { font-size: 12px; opacity: 0.6; }
#header-link {
  margin-left: auto;
  color: rgba(255,255,255,0.75);
  font-size: 13px;
  text-decoration: none;
}
#header-link:hover { color: #fff; }

#main {
  max-width: 900px;
  margin: 0 auto;
  padding: 28px 16px 60px;
}

#summary-bar {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
#est-count {
  font-size: 13px;
  color: var(--muted);
  flex: 1;
}

.btn {
  padding: 9px 20px;
  border: none;
  border-radius: 5px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}
.btn-secondary { background: #e5e7eb; color: var(--text); }
.btn-secondary:hover { background: #d1d5db; }

#empty-state {
  display: none;
  text-align: center;
  color: var(--muted);
  padding: 60px 20px;
  font-size: 15px;
}
#empty-state a { color: var(--blue); }

#est-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--surface);
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  font-size: 14px;
}
#est-table th {
  text-align: left;
  padding: 10px 14px;
  background: #f9fafb;
  border-bottom: 2px solid var(--border);
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
#est-table td {
  padding: 10px 14px;
  border-bottom: 1px solid #f3f4f6;
  vertical-align: middle;
}
#est-table tbody tr:last-child td { border-bottom: none; }
#est-table tbody tr:hover { background: #fafafa; }

.mono { font-family: monospace; font-weight: 700; font-size: 14px; }
.total-cell { font-weight: 700; text-align: right; white-space: nowrap; }
.actions-cell { white-space: nowrap; text-align: right; }

.btn-sm {
  padding: 5px 12px;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  margin-left: 4px;
}
.btn-view { background: var(--blue-lt); color: var(--blue-dk); }
.btn-view:hover { background: #dbeafe; }
.btn-pdf  { background: #f3f4f6; color: var(--text); }
.btn-pdf:hover  { background: #e5e7eb; }
.btn-del  { background: var(--red-lt); color: var(--red); }
.btn-del:hover  { background: #fee2e2; }

#footer-actions {
  margin-top: 24px;
  display: flex;
  gap: 12px;
  align-items: center;
}
#footer-actions .hint {
  font-size: 12px;
  color: var(--muted);
}

#page-footer {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  padding: 16px;
  border-top: 1px solid var(--border);
  margin-top: 32px;
}
</style>
</head>
<body>

<div id="app-header">
  <span class="brand-sub">LayoutOS</span>
  <span class="brand-main">Fudd Service</span>
  <span class="brand-tag">Saved Estimates</span>
  <a href="shed-quote.html" id="header-link">← New Estimate</a>
</div>

<div id="main">

  <div id="summary-bar">
    <span id="est-count"></span>
  </div>

  <div id="empty-state">
    No saved estimates yet.<br>
    <a href="shed-quote.html">Generate your first estimate →</a>
  </div>

  <table id="est-table">
    <thead>
      <tr>
        <th>Estimate #</th>
        <th>Date</th>
        <th>Customer</th>
        <th>Style</th>
        <th>Size</th>
        <th style="text-align:right">Total</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="est-body"></tbody>
  </table>

  <div id="footer-actions">
    <button class="btn btn-secondary" onclick="downloadAllJSON()">⬇ Download All (JSON)</button>
    <span class="hint" id="dl-hint"></span>
  </div>

</div>

<div id="page-footer">
  www.fuddservice.com &nbsp;|&nbsp; LayoutOS
</div>

<script type="module">
import { formatCurrency, formatDate } from '../../core/layoutos-core.js';

const QUOTES_KEY = 'layoutos_quotes_log';

function getQuotes() {
  try { return JSON.parse(localStorage.getItem(QUOTES_KEY) || '[]'); } catch(_) { return []; }
}
function saveQuotes(arr) { localStorage.setItem(QUOTES_KEY, JSON.stringify(arr)); }

function openOutput(quote) {
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(quote))));
  localStorage.setItem('layoutos_current_quote', JSON.stringify(quote));
  return window.open(`../../core/proposal.html?q=${encoded}`, '_blank');
}

function render() {
  const quotes  = getQuotes();
  const tbody   = document.getElementById('est-body');
  const empty   = document.getElementById('empty-state');
  const table   = document.getElementById('est-table');
  const count   = document.getElementById('est-count');
  const footer  = document.getElementById('footer-actions');

  count.textContent = `${quotes.length} estimate${quotes.length !== 1 ? 's' : ''} saved`;
  footer.style.display = quotes.length ? 'flex' : 'none';

  if (quotes.length === 0) {
    table.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  table.style.display = 'table';
  empty.style.display = 'none';

  // Newest first
  const rows = [...quotes].map((q, i) => ({ q, i })).reverse();

  tbody.innerHTML = rows.map(({ q, i }) => {
    const size   = q.building ? `${q.building.width}×${q.building.length}` : '—';
    const style  = q.building?.style || '—';
    const total  = q.pricing?.total != null ? formatCurrency(q.pricing.total) : '—';
    const date   = q.date || (q.timestamp ? formatDate(q.timestamp) : '—');
    const cust   = q.customer?.name || '—';
    const num    = q.estimateNumber || '—';
    return `<tr>
      <td class="mono">${num}</td>
      <td>${date}</td>
      <td>${esc(cust)}</td>
      <td style="color:var(--muted);font-size:13px">${esc(style)}</td>
      <td>${size}</td>
      <td class="total-cell">${total}</td>
      <td class="actions-cell">
        <button class="btn-sm btn-view" onclick="viewEst(${i})">View</button>
        <button class="btn-sm btn-pdf"  onclick="pdfEst(${i})">PDF</button>
        <button class="btn-sm btn-del"  onclick="delEst(${i})">Delete</button>
      </td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.viewEst = function(idx) {
  const q = getQuotes()[idx];
  if (!q) return;
  openOutput(q);
};

window.pdfEst = function(idx) {
  const q = getQuotes()[idx];
  if (!q) return;
  const win = openOutput(q);
  // Give output page time to render, then trigger print dialog
  if (win) setTimeout(() => { try { win.print(); } catch(_) {} }, 1200);
};

window.delEst = function(idx) {
  const quotes = getQuotes();
  const q = quotes[idx];
  if (!q) return;
  const label = q.estimateNumber || `#${idx + 1}`;
  const name  = q.customer?.name || 'unknown';
  // Find the row and show inline confirm
  const rows = document.querySelectorAll('#est-body tr');
  // rows are newest-first, idx is original array index
  const total = quotes.length;
  const rowEl = rows[total - 1 - idx];
  if (!rowEl) return;
  const cell = rowEl.querySelector('.actions-cell');
  const orig = cell.innerHTML;
  cell.innerHTML = `<span style="font-size:12px;color:var(--red);margin-right:6px">Delete ${label}?</span>
    <button class="btn-sm btn-del" onclick="confirmDel(${idx})">Yes</button>
    <button class="btn-sm btn-view" onclick="cancelDel(${idx}, this)" data-orig="${encodeURIComponent(orig)}">No</button>`;
};

window.confirmDel = function(idx) {
  const quotes = getQuotes();
  quotes.splice(idx, 1);
  saveQuotes(quotes);
  render();
};

window.cancelDel = function(idx, btn) {
  const cell = btn.closest('.actions-cell');
  cell.innerHTML = decodeURIComponent(btn.dataset.orig);
};

window.downloadAllJSON = function() {
  const quotes = getQuotes();
  if (!quotes.length) { alert('No estimates to download.'); return; }
  const json = JSON.stringify(quotes, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `fudd-estimates-${new Date().toISOString().slice(0, 10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const hint = document.getElementById('dl-hint');
  hint.textContent = `${quotes.length} estimates downloaded`;
  setTimeout(() => { hint.textContent = ''; }, 3000);
};

render();
</script>
</body>
</html>
